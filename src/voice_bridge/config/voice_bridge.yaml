voice:
  wake_words: ["宇树", "小宇"]
  stop_words: ["停止", "停下", "别动", "取消", "stop"]
  idle_timeout_sec: 20.0
  max_session_sec: 300.0
  min_confidence: 0.5
  process_partial: false

motion_defaults:
  default_vx: 0.25
  default_vy: 0.15
  default_vyaw: 0.5
  default_motion_duration_sec: 1.0
  max_motion_duration_sec: 2.0

agent:
  backend: pi_rpc
  http_endpoint: ""
  timeout_sec: 2.0
  pi:
    enabled: true
    command: "/home/ubuntu/.nvm/versions/node/v24.18.0/bin/pi"
    args: ["--mode", "rpc", "--no-session"]
    workspace: ".agent-runtime/.unitree_agent"
    model: ""
    provider: ""
    extensions:
      - "src/voice_bridge/pi_extensions/robot-tools.ts"
    env_keep:
      - HOME
      - PATH
      - NODE_PATH
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GEMINI_API_KEY
    env_extra: {}
    timeouts:
      startup_health_sec: 20.0
      command_response_sec: 5.0
      conversational_turn_sec: 120.0
      idle_health_check_sec: 30.0
      restart_backoff_max_sec: 30.0
      restart_max_attempts: 5

topics:
  asr: /g1/audio/asr
  voice_loco: /voice/cmd/loco
  voice_action: /voice/cmd/action
  tts: /g1/cmd/audio/tts
  led: /g1/cmd/audio/led
  voice_state: /voice/state
  debug_events: /voice/debug/events
  robot_mode: /g1/state/mode
  safety_state: /g1/state/safety
  health: /g1/state/health
