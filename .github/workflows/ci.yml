name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble
      - uses: cachix/install-nix-action@v31
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/voice_bridge_debug/frontend/package-lock.json
      - run: nix build .#unitree-ros2
      - run: make bootstrap
      - run: make build
      - run: make test
      - run: make check-textop-core
      - run: make test-integration
      - run: make frontend
      - run: make lint
